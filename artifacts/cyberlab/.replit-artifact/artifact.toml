kind = "web"
previewPath = "/"
title = "CyberLab Training Platform"
version = "1.0.0"
id = "artifacts/cyberlab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20421

[services.development]
run = "pnpm --filter @workspace/cyberlab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyberlab", "run", "build" ]
publicDir = "artifacts/cyberlab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20421"
BASE_PATH = "/"
